networks:
  verbalyn-net:
    driver: bridge

volumes:
  mongo-data:
  redis-data:
  rabbitmq-data:
  opensearch-data:
  prometheus-data:
  grafana-data:

services:

  mongo:
    image: mongo:7
    container_name: verbalyn-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks: [verbalyn-net]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-secret}
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: verbalyn-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks: [verbalyn-net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: verbalyn-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks: [verbalyn-net]

  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: verbalyn-opensearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_PASS:-Admin@1234!}
      - DISABLE_INSTALL_DEMO_CONFIG=false
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
    networks: [verbalyn-net]

  auth-service:
    build: ./auth-service
    container_name: verbalyn-auth
    restart: unless-stopped
    depends_on:
      mongo: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      PORT: 3001
      MONGO_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASS:-secret}@mongo:27017/verbalyn?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-changeme-in-prod}
      SESSION_SECRET: ${SESSION_SECRET:-changeme-in-prod}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:3001/auth/google/callback}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      NODE_ENV: ${NODE_ENV:-development}
    networks: [verbalyn-net]
    ports:
      - "3001:3001"

  user-service:
    build: ./user-service
    container_name: verbalyn-user
    restart: unless-stopped
    depends_on:
      mongo: { condition: service_healthy }
    environment:
      PORT: 3002
      MONGO_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASS:-secret}@mongo:27017/verbalyn?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-changeme-in-prod}
      NODE_ENV: ${NODE_ENV:-development}
    networks: [verbalyn-net]
    ports:
      - "3002:3002"

  chat-service:
    build: ./chat-service
    container_name: verbalyn-chat
    restart: unless-stopped
    depends_on:
      mongo: { condition: service_healthy }
    environment:
      PORT: 3003
      MONGO_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASS:-secret}@mongo:27017/verbalyn?authSource=admin
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
      JWT_SECRET: ${JWT_SECRET:-changeme-in-prod}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    networks: [verbalyn-net]
    ports:
      - "3003:3003"

  notification-service:
    build: ./notification-service
    container_name: verbalyn-notification
    restart: unless-stopped
    depends_on:
      mongo: { condition: service_healthy }
    environment:
      PORT: 3004
      MONGO_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASS:-secret}@mongo:27017/verbalyn?authSource=admin
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
      JWT_SECRET: ${JWT_SECRET:-changeme-in-prod}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      NODE_ENV: ${NODE_ENV:-development}
    networks: [verbalyn-net]
    ports:
      - "3004:3004"

  dashboard-service:
    build: ./dashboard-service
    container_name: verbalyn-dashboard
    restart: unless-stopped
    depends_on:
      mongo: { condition: service_healthy }
    environment:
      PORT: 3005
      MONGO_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASS:-secret}@mongo:27017/verbalyn?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-changeme-in-prod}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      NODE_ENV: ${NODE_ENV:-development}
    networks: [verbalyn-net]
    ports:
      - "3005:3005"

  frontend:
    build: ./frontend
    container_name: verbalyn-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    networks: [verbalyn-net]

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: verbalyn-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks: [verbalyn-net]

  grafana:
    image: grafana/grafana:10.4.2
    container_name: verbalyn-grafana
    restart: unless-stopped
    depends_on: [prometheus]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASS:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/verbalyn.json
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3010:3000"
    networks: [verbalyn-net]

  node-exporter:
    image: prom/node-exporter:v1.8.0
    container_name: verbalyn-node-exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks: [verbalyn-net]
    ports:
      - "9100:9100"

  kong:
    image: kong:3.6
    container_name: verbalyn-kong
    restart: unless-stopped

    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001

    volumes:
      - ./gateway/kong.yml:/kong/declarative/kong.yml:ro

    ports:
      - "8000:8000"
      - "8001:8001"

    depends_on:
      - auth-service
      - user-service
      - chat-service
      - notification-service
      - dashboard-service

    networks:
      - verbalyn-net