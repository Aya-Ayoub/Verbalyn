name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Auth Service ───────────────────────────────────────────────────────────
  test-auth:
    name: Auth Service Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auth-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: auth-service/package-lock.json
      - run: npm ci
      - run: npm test -- --coverage --coverageThreshold='{"global":{"lines":80}}'
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: auth-coverage
          path: auth-service/coverage/

  # ─── User Service ───────────────────────────────────────────────────────────
  test-user:
    name: User Service Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: user-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: user-service/package-lock.json
      - run: npm ci
      - run: npm test -- --coverage --coverageThreshold='{"global":{"lines":80}}'
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: user-coverage
          path: user-service/coverage/

  # ─── Chat Service ───────────────────────────────────────────────────────────
  test-chat:
    name: Chat Service Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chat-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: chat-service/package-lock.json
      - run: npm ci
      - run: npm test -- --coverage

  # ─── Dashboard Service ──────────────────────────────────────────────────────
  test-dashboard:
    name: Dashboard Service Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard-service/package-lock.json
      - run: npm ci
      - run: npm test -- --coverage

  # ─── Frontend Build ─────────────────────────────────────────────────────────
  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ─── Docker Build Check ─────────────────────────────────────────────────────
  docker-build:
    name: Docker Compose Build
    runs-on: ubuntu-latest
    needs: [test-auth, test-user, build-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Copy env
        run: cp .env.example .env
      - name: Build images
        run: docker compose build --parallel auth-service user-service frontend