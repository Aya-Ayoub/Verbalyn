openapi: 3.0.0
info:
  title: Verbalyn Chat API
  version: 1.0.0
  description: API for a real-time chat system with authentication and messaging

servers:
  - url: http://localhost:3000

security:
  - bearerAuth: []

paths:

  /auth/google:
    post:
      tags: [Auth]
      summary: Redirect user to Google OAuth login
      responses:
        '302':
          description: Redirect to Google OAuth
        '500':
          description: Server error

  /users/profile:
    get:
      tags: [Users]
      summary: Get authenticated user profile
      responses:
        '200':
          description: User profile returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized

  /messages:
    post:
      tags: [Messages]
      summary: Send a message
      description: Sends a message from one user to another within a conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
            example:
              receiverId: "user123"
              message: "Hello!"
      responses:
        '201':
          description: Message sent successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          description: Invalid input
        '401':
          description: Unauthorized

  /messages/{conversationId}:
    get:
      tags: [Messages]
      summary: Retrieve chat history
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Messages retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Message'
        '404':
          description: Conversation not found
        '401':
          description: Unauthorized

  /messages/{id}:
    put:
      tags: [Messages]
      summary: Update a message
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
              required: [message]
            example:
              message: "Updated message"
      responses:
        '200':
          description: Message updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          description: Invalid input
        '404':
          description: Message not found
        '401':
          description: Unauthorized

    delete:
      tags: [Messages]
      summary: Delete a message
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Message deleted
        '404':
          description: Message not found
        '401':
          description: Unauthorized

  /dashboard/stats:
    get:
      tags: [Dashboard]
      summary: Get system statistics for dashboard
      responses:
        '200':
          description: Dashboard stats returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardStats'
        '401':
          description: Unauthorized
        '500':
          description: Server error

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, username, email]

    Message:
      type: object
      properties:
        id:
          type: string
        senderId:
          type: string
        receiverId:
          type: string
        message:
          type: string
        timestamp:
          type: string
          format: date-time
      required: [id, senderId, receiverId, message, timestamp]

    SendMessageRequest:
      type: object
      properties:
        receiverId:
          type: string
        message:
          type: string
      required: [receiverId, message]

    DashboardStats:
      type: object
      properties:
        totalUsers:
          type: integer
        totalMessages:
          type: integer
        activeConversations:
          type: integer
      required: [totalUsers, totalMessages, activeConversations]